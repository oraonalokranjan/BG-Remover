<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Background Removal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="upload-area">
            <div class="upload-area-header">
                <h2>Upload an Image</h2>
                <p>and watch the magic happen</p>
            </div>
            <div class="upload-area-body">
                <div class="upload-area-body-content">
                    <i class="fas fa-cloud-upload-alt"></i>
                    <p>Drag and drop your image here</p>
                    <p>or</p>
                    <button class="btn">Browse</button>
                    <input type="file" id="file" hidden>
                </div>
            </div>
        </div>
        <div class="preview-area">
            <div class="preview-area-header">
                <h2>Preview</h2>
            </div>
            <div class="preview-area-body">
                <img src="" alt="" id="preview">
            </div>
        </div>
    </div>
    <script src="https://kit.fontawesome.com/a076d05399.js"></script>
    <script src="script.js"></script>
</body>
</html>
